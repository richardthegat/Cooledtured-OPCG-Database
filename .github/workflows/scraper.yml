name: TCGPlayer Weekly Scraper

on:
  schedule:
    - cron: "0 9 * * 0"  # Every Sunday at 9AM UTC
  workflow_dispatch:       # Lets you also trigger it manually anytime

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          pip install selenium supabase

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraping_db.py
